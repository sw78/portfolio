<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel wejść — portfolio</title>
<style>
  :root {
    --bg: #14171A;
    --panel: #1B1F23;
    --panel-hover: #20252A;
    --border: #2D3339;
    --border-light: #3A4148;
    --text: #E7E5E0;
    --text-dim: #8B9198;
    --text-faint: #565D64;
    --amber: #E8A33D;
    --cyan: #4FC3D9;
    --green: #6FCF97;
    --mono: 'Consolas', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 60px 24px;
  }
  .wrap { max-width: 780px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: var(--text-faint);
    font-size: 13px;
    margin-bottom: 36px;
  }
  .total-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-card .label {
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .total-card .value {
    font-size: 40px;
    font-weight: 700;
    color: var(--cyan);
  }
  .grid {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }
  .row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color .15s, background .15s;
  }
  .row:hover { border-color: var(--border-light); background: var(--panel-hover); }
  .row .name { font-size: 14px; color: var(--text); }
  .row .value { font-size: 24px; font-weight: 700; color: var(--amber); min-width: 60px; text-align: right; }
  .row .value.loading { color: var(--text-faint); font-size: 14px; font-weight: 400; }
  .row .meta { text-align: right; }
  .row .prev { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .row .prev .delta-up { color: var(--green); }
  .row .prev .delta-zero { color: var(--text-faint); }
  .total-card .prev { font-size: 12px; color: var(--text-faint); margin-top: 4px; text-align: right; }
  .total-card .prev .delta-up { color: var(--green); }
  button {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 9px 18px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:hover { background: rgba(79,195,217,0.1); }
  button:disabled { opacity: .4; cursor: default; }
  .status { color: var(--text-faint); font-size: 12px; margin-top: 14px; }

  .history {
    margin-top: 36px;
  }
  .history h2 {
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .history-empty {
    font-size: 12px;
    color: var(--text-faint);
    padding: 16px 0;
  }
  .hist-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 18px;
    margin-bottom: 8px;
  }
  .hist-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .hist-date { font-size: 12px; color: var(--text-dim); }
  .hist-total { font-size: 16px; font-weight: 700; color: var(--cyan); }
  .hist-total .delta-up { font-size: 11px; color: var(--green); font-weight: 400; margin-left: 6px; }
  .hist-total .delta-zero { font-size: 11px; color: var(--text-faint); font-weight: 400; margin-left: 6px; }
  .hist-breakdown {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }
  .hist-clear {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 14px;
  }
  .hist-clear:hover { border-color: var(--text-dim); color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Panel wejść — portfolio</h1>
  <div class="sub">Odczyt licznika NIE zwiększa liczby wejść.</div>

  <div class="total-card">
    <span class="label">Suma wejść</span>
    <span style="text-align:right;">
      <div class="value" id="total">—</div>
      <div class="prev" id="totalPrev"></div>
    </span>
  </div>

  <div class="grid" id="grid"></div>

  <button id="refresh">Odśwież</button>
  <div class="status" id="status"></div>

  <div class="history">
    <h2>Historia odczytów</h2>
    <div id="historyList"></div>
    <button class="hist-clear" id="clearHistory">Wyczyść historię</button>
  </div>
</div>

<script>
  // Klucze — muszą być IDENTYCZNE jak w plikach każdej apki.
  const APPS = [
    { name: "Strona główna (index.html)", key: "sw78_portfolio_visits_9f3k2" },
    { name: "Dashboard Produkcyjny",       key: "sw78_app_dashboard_9f3k2" },
    { name: "Grafik Pro",                  key: "sw78_app_grafikpro_9f3k2" },
    { name: "MPM-MFG — Process Mining",    key: "sw78_app_mpmmfg_9f3k2" },
  ];

  const SNAPSHOT_KEY = "sw78_panel_snapshot";     // stary klucz, dla zgodności/migracji
  const HISTORY_KEY = "sw78_panel_history";        // NOWY: pełna historia odczytów
  const MAX_HISTORY = 200;                          // limit wpisów, żeby nie rosło w nieskończoność

  const grid = document.getElementById("grid");
  const totalEl = document.getElementById("total");
  const totalPrevEl = document.getElementById("totalPrev");
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("refresh");
  const historyListEl = document.getElementById("historyList");
  const clearHistoryBtn = document.getElementById("clearHistory");

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    // Migracja: jeśli nie ma jeszcze historii, ale jest stary pojedynczy snapshot — użyj go jako pierwszego wpisu
    try {
      const oldRaw = localStorage.getItem(SNAPSHOT_KEY);
      if (oldRaw) {
        const old = JSON.parse(oldRaw);
        return [{ when: old.when || "wcześniej", total: old.total, apps: old.apps || {} }];
      }
    } catch (e) {}
    return [];
  }

  function saveHistory(history) {
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
    } catch (e) {
      // localStorage niedostępny (np. tryb prywatny) — po prostu nie zapamiętujemy
    }
  }

  function deltaHtml(current, previous) {
    const diff = current - previous;
    if (diff > 0) return `<span class="delta-up">+${diff}</span>`;
    if (diff < 0) return `<span class="delta-zero">${diff}</span>`;
    return `<span class="delta-zero">bez zmian</span>`;
  }

  function appNameByKey(key) {
    const app = APPS.find(a => a.key === key);
    return app ? app.name : key;
  }

  function renderHistory(history) {
    if (!history.length) {
      historyListEl.innerHTML = `<div class="history-empty">Brak wcześniejszych odczytów — pojawią się tu od kolejnego otwarcia panelu.</div>`;
      clearHistoryBtn.style.display = "none";
      return;
    }
    clearHistoryBtn.style.display = "inline-block";

    historyListEl.innerHTML = history.map((entry, i) => {
      const prev = history[i + 1]; // starszy wpis, do porównania
      const deltaPart = prev ? deltaHtml(entry.total, prev.total) : "";
      const breakdown = APPS.map(app => {
        const val = entry.apps ? entry.apps[app.key] : undefined;
        return val != null ? `${app.name}: ${val}` : null;
      }).filter(Boolean).join(" · ");

      return `
        <div class="hist-row">
          <div class="hist-top">
            <span class="hist-date">${entry.when || "—"}</span>
            <span class="hist-total">${entry.total}${deltaPart}</span>
          </div>
          ${breakdown ? `<div class="hist-breakdown">${breakdown}</div>` : ""}
        </div>`;
    }).join("");
  }

  // buduj wiersze raz
  APPS.forEach(app => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <span class="name">${app.name}</span>
      <span class="meta">
        <div class="value loading" id="v_${app.key}">…</div>
        <div class="prev" id="p_${app.key}"></div>
      </span>`;
    grid.appendChild(row);
  });

  clearHistoryBtn.addEventListener("click", () => {
    if (!confirm("Usunąć całą zapisaną historię odczytów z tej przeglądarki?")) return;
    localStorage.removeItem(HISTORY_KEY);
    localStorage.removeItem(SNAPSHOT_KEY);
    renderHistory([]);
  });

  function loadAll() {
    btn.disabled = true;
    statusEl.textContent = "Wczytywanie…";

    const history = loadHistory();
    const prevEntry = history[0] || null; // najnowszy dotychczasowy wpis = "poprzedni" względem tego odczytu

    const requests = APPS.map(app =>
      fetch("https://countapi.mileshilliard.com/api/v1/get/" + app.key)
        .then(r => r.json())
        .then(data => ({ key: app.key, value: data.value != null ? data.value : 0 }))
        .catch(() => ({ key: app.key, value: null }))
    );

    Promise.all(requests).then(results => {
      let sum = 0;
      const currentPerApp = {};

      results.forEach(res => {
        const valueEl = document.getElementById("v_" + res.key);
        const prevEl = document.getElementById("p_" + res.key);
        valueEl.classList.remove("loading");

        if (res.value === null) {
          valueEl.textContent = "błąd";
          prevEl.textContent = "";
          return;
        }

        valueEl.textContent = res.value;
        sum += Number(res.value);
        currentPerApp[res.key] = Number(res.value);

        if (prevEntry && prevEntry.apps && prevEntry.apps[res.key] != null) {
          const prevVal = prevEntry.apps[res.key];
          prevEl.innerHTML = `poprzednio: ${prevVal} (${deltaHtml(res.value, prevVal)})`;
        } else {
          prevEl.textContent = "brak danych z poprzedniej wizyty";
        }
      });

      totalEl.textContent = sum;
      if (prevEntry && typeof prevEntry.total === "number") {
        totalPrevEl.innerHTML = `poprzednio: ${prevEntry.total} (${deltaHtml(sum, prevEntry.total)}) — ${prevEntry.when || ""}`;
      } else {
        totalPrevEl.textContent = "brak danych z poprzedniej wizyty";
      }

      const nowText = new Date().toLocaleString("pl-PL");
      statusEl.textContent = "Ostatnie odświeżenie: " + nowText;

      // Dopisz NOWY wpis na początek historii i zapisz
      const newEntry = { when: nowText, total: sum, apps: currentPerApp };
      const updatedHistory = [newEntry, ...history];
      saveHistory(updatedHistory);
      renderHistory(updatedHistory);

      btn.disabled = false;
    });
  }

  btn.addEventListener("click", loadAll);
  loadAll();
</script>
</body>
</html>
